<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title if title else "Real Time Transport Tranking Sysytem For Small cities" }}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style> body{padding-top:56px;} </style>
  </head>
  <body>
    <nav class="navbar fixed-top navbar-dark bg-dark">
      <div class="container-fluid d-flex align-items-center justify-content-between">
        <!-- brand + button inline -->
        <div class="d-flex align-items-center gap-2">
          <a class="navbar-brand mb-0 h1" href="/">Simple mobile Bus Tracking  </a>
          <button id="menuBtn" class="navbar-toggler" type="button" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>

        <!-- collapse area (starts hidden) -->
        <div class="navbar-collapse collapse" id="menuOptions">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">User</a>
            <a class="nav-link" href="/driver">Driver</a>
            <a class="nav-link" href="/admin">Admin</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-3">{% block content %}{% endblock %}</main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- manual toggle -->
    <script>
      document.getElementById('menuBtn').addEventListener('click', function () {
        const el = document.getElementById('menuOptions');
        el.classList.toggle('show');
        const expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', String(!expanded));
      });
    </script>
  </body>
</html>
